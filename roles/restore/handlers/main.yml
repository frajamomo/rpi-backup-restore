---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: Restart openvpn
  ansible.builtin.systemd:
    name: openvpn
    state: restarted

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: Restart auditd
  ansible.builtin.command: service auditd restart
  changed_when: true

- name: Restart netfilter-persistent
  ansible.builtin.systemd:
    name: netfilter-persistent
    state: restarted

- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true
