---
- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Restart and enable core services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    enabled: true
  loop:
    - sshd
    - openvpn
    - fail2ban
    - netfilter-persistent

- name: Restart auditd (requires service command)
  ansible.builtin.command: service auditd restart
  changed_when: true

- name: Enable auditd
  ansible.builtin.systemd:
    name: auditd
    enabled: true

- name: Enable and start Docker compose units
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: "{{ docker_compose_units }}"

- name: Enable AIDE check timer
  ansible.builtin.systemd:
    name: aide-check.timer
    state: started
    enabled: true
  ignore_errors: true
